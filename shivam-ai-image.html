<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivam AI Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050510;
    --card: #0d0d2b;
    --border: #1a1a4e;
    --accent: #00f5ff;
    --accent2: #ff00ff;
    --accent3: #7b2fff;
    --text: #e0e0ff;
    --muted: #6060a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(0,245,255,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,0,255,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(123,47,255,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid lines bg */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  header {
    text-align: center;
    padding: 40px 0 30px;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent3), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    animation: glow 3s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { filter: drop-shadow(0 0 8px rgba(0,245,255,0.5)); }
    to { filter: drop-shadow(0 0 20px rgba(255,0,255,0.5)); }
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.3s;
    text-transform: uppercase;
  }

  .tab.active {
    background: linear-gradient(135deg, rgba(0,245,255,0.15), rgba(123,47,255,0.15));
    color: var(--accent);
    border: 1px solid rgba(0,245,255,0.3);
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  textarea, input[type="text"], input[type="password"] {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.3s;
    resize: none;
  }

  textarea:focus, input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,245,255,0.15);
  }

  textarea { min-height: 90px; }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    margin-top: 12px;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    color: #000;
    position: relative;
    overflow: hidden;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,245,255,0.3);
  }

  .btn:active { transform: translateY(0); }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }

  .btn:hover::after { transform: translateX(100%); }

  .image-output {
    width: 100%;
    border-radius: 12px;
    border: 1px solid var(--border);
    display: none;
    margin-top: 16px;
  }

  .image-output.visible { display: block; }

  .status {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    padding: 16px;
    letter-spacing: 1px;
  }

  .status.loading {
    color: var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .status.error { color: #ff4466; }
  .status.success { color: #00ff88; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 12px;
  }

  .upload-area:hover {
    border-color: var(--accent);
    background: rgba(0,245,255,0.05);
  }

  .upload-icon { font-size: 32px; margin-bottom: 8px; }

  .upload-text {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .preview-img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 12px;
    display: none;
  }

  .preview-img.visible { display: block; }

  input[type="file"] { display: none; }

  .api-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  .download-btn {
    background: linear-gradient(135deg, #00ff88, #00b4d8);
    color: #000;
    margin-top: 10px;
    display: none;
  }

  .download-btn.visible { display: block; }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .size-options {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .size-btn {
    flex: 1;
    padding: 8px 4px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .size-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,245,255,0.08);
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">SHIVAM AI</div>
    <div class="subtitle">Image Generation Studio</div>
  </header>

  <!-- API Key Card -->
  <div class="card">
    <div class="card-title">⚡ Gemini API Key</div>
    <input type="password" id="apiKey" placeholder="Apni Gemini API key yahan daalo..." />
    <div class="api-hint">🔒 Key sirf tere phone mein rehti hai, kahi save nahi hoti.</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('generate')">🎨 Generate</button>
    <button class="tab" onclick="switchTab('edit')">✏️ Edit Photo</button>
  </div>

  <!-- Generate Panel -->
  <div class="panel active" id="panel-generate">
    <div class="card">
      <div class="card-title">🖊️ Prompt</div>
      <textarea id="promptText" placeholder="Kya banana hai? Jaise: 'A samurai warrior in Tokyo at night, neon lights, cinematic...'"></textarea>

      <div style="margin-top:12px;">
        <div class="card-title" style="margin-bottom:8px;">📐 Image Size</div>
        <div class="size-options">
          <div class="size-btn active" onclick="selectSize(this,'1024x1024')">Square<br><small>1:1</small></div>
          <div class="size-btn" onclick="selectSize(this,'1024x1792')">Portrait<br><small>9:16</small></div>
          <div class="size-btn" onclick="selectSize(this,'1792x1024')">Landscape<br><small>16:9</small></div>
        </div>
      </div>

      <button class="btn" onclick="generateImage()" id="genBtn">🚀 Generate Image</button>
    </div>

    <div id="genStatus" class="status"></div>
    <img id="genOutput" class="image-output" />
    <button class="btn download-btn" id="genDownload" onclick="downloadImage('genOutput','generated')">⬇️ Download Image</button>
  </div>

  <!-- Edit Panel -->
  <div class="panel" id="panel-edit">
    <div class="card">
      <div class="card-title">📸 Apni Photo Upload Karo</div>
      <div class="upload-area" onclick="document.getElementById('photoInput').click()">
        <div class="upload-icon">📁</div>
        <div class="upload-text">TAP TO SELECT PHOTO</div>
      </div>
      <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(event)" />
      <img id="photoPreview" class="preview-img" />
    </div>

    <div class="card">
      <div class="card-title">✨ Edit Instructions</div>
      <textarea id="editPrompt" placeholder="Kya change karna hai? Jaise: 'Background ko anime style Tokyo mein badlo' ya 'Mujhe superhero costume pehna do'..."></textarea>
      <button class="btn" onclick="editImage()" id="editBtn">⚡ Edit Photo</button>
    </div>

    <div id="editStatus" class="status"></div>
    <img id="editOutput" class="image-output" />
    <button class="btn download-btn" id="editDownload" onclick="downloadImage('editOutput','edited')">⬇️ Download Image</button>
  </div>
</div>

<script>
let selectedSize = '1024x1024';
let photoBase64 = null;
let photoMime = 'image/jpeg';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

function selectSize(el, size) {
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedSize = size;
}

function getApiKey() {
  return document.getElementById('apiKey').value.trim();
}

async function generateImage() {
  const key = getApiKey();
  const prompt = document.getElementById('promptText').value.trim();
  const statusEl = document.getElementById('genStatus');
  const outputEl = document.getElementById('genOutput');
  const dlBtn = document.getElementById('genDownload');
  const btn = document.getElementById('genBtn');

  if (!key) { showStatus(statusEl, '⚠️ Pehle API key daalo!', 'error'); return; }
  if (!prompt) { showStatus(statusEl, '⚠️ Prompt khali hai!', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';
  outputEl.classList.remove('visible');
  dlBtn.classList.remove('visible');
  showStatus(statusEl, '🔄 Image ban rahi hai... thoda wait karo!', 'loading');

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseModalities: ["TEXT", "IMAGE"] }
      })
    });

    const data = await response.json();

    if (data.error) throw new Error(data.error.message);

    const parts = data.candidates?.[0]?.content?.parts || [];
    const imgPart = parts.find(p => p.inlineData);

    if (imgPart) {
      const src = `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
      outputEl.src = src;
      outputEl.classList.add('visible');
      dlBtn.classList.add('visible');
      showStatus(statusEl, '✅ Image ready hai!', 'success');
    } else {
      throw new Error('Image nahi bani, dobara try karo.');
    }
  } catch (err) {
    showStatus(statusEl, '❌ Error: ' + err.message, 'error');
  }

  btn.disabled = false;
  btn.innerHTML = '🚀 Generate Image';
}

function previewPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  photoMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('photoPreview');
    preview.src = e.target.result;
    preview.classList.add('visible');
    photoBase64 = e.target.result.split(',')[1];
  };
  reader.readAsDataURL(file);
}

async function editImage() {
  const key = getApiKey();
  const prompt = document.getElementById('editPrompt').value.trim();
  const statusEl = document.getElementById('editStatus');
  const outputEl = document.getElementById('editOutput');
  const dlBtn = document.getElementById('editDownload');
  const btn = document.getElementById('editBtn');

  if (!key) { showStatus(statusEl, '⚠️ Pehle API key daalo!', 'error'); return; }
  if (!photoBase64) { showStatus(statusEl, '⚠️ Pehle photo upload karo!', 'error'); return; }
  if (!prompt) { showStatus(statusEl, '⚠️ Edit instructions likhlo!', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Editing...';
  outputEl.classList.remove('visible');
  dlBtn.classList.remove('visible');
  showStatus(statusEl, '🔄 Photo edit ho rahi hai...', 'loading');

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inlineData: { mimeType: photoMime, data: photoBase64 } },
            { text: prompt }
          ]
        }],
        generationConfig: { responseModalities: ["TEXT", "IMAGE"] }
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const parts = data.candidates?.[0]?.content?.parts || [];
    const imgPart = parts.find(p => p.inlineData);

    if (imgPart) {
      const src = `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
      outputEl.src = src;
      outputEl.classList.add('visible');
      dlBtn.classList.add('visible');
      showStatus(statusEl, '✅ Photo edit ho gayi!', 'success');
    } else {
      throw new Error('Edit nahi hua, dobara try karo.');
    }
  } catch (err) {
    showStatus(statusEl, '❌ Error: ' + err.message, 'error');
  }

  btn.disabled = false;
  btn.innerHTML = '⚡ Edit Photo';
}

function downloadImage(imgId, name) {
  const img = document.getElementById(imgId);
  const a = document.createElement('a');
  a.href = img.src;
  a.download = `shivam-ai-${name}-${Date.now()}.png`;
  a.click();
}

function showStatus(el, msg, type) {
  el.textContent = msg;
  el.className = 'status ' + type;
}
</script>
</body>
</html>
